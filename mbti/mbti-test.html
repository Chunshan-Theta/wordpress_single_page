<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep:    #0b0f1a;
  --bg-mid:     #141929;
  --bg-card:    rgba(255,255,255,0.05);
  --border:     rgba(255,255,255,0.12);
  --accent:     #7c6fff;
  --accent-2:   #c084fc;
  --accent-glow:rgba(124,111,255,0.25);
  --gold:       #f59e0b;
  --green:      #22c55e;
  --red:        #ef4444;
  --text-1:     #f1f5f9;
  --text-2:     #94a3b8;
  --text-3:     #64748b;
  --radius:     14px;
  --shadow:     0 8px 32px rgba(0,0,0,0.4);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  background: linear-gradient(135deg, #0b0f1a 0%, #141929 50%, #0d1220 100%);
  color: var(--text-1);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Particle background ── */
.particles {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(1px 1px at 5%  10%, rgba(200,180,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 80%, rgba(160,130,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 35%, rgba(200,180,255,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 60%, rgba(160,130,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 20%, rgba(200,180,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 75%, rgba(160,130,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 45%, rgba(200,180,255,.6) 0%, transparent 100%),
    radial-gradient(2px 2px at 15% 55%, rgba(124,111,255,.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 70% 30%, rgba(192,132,252,.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 88% 85%, rgba(124,111,255,.25) 0%, transparent 100%);
}

/* ── Layout ── */
#app {
  position: relative; z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* ── Screen toggle ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── Start screen ── */
.start-header {
  text-align: center;
  padding: 48px 0 32px;
}
.start-logo {
  font-size: 5rem;
  margin-bottom: 12px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
.start-title {
  font-size: clamp(1.8rem, 5vw, 2.6rem);
  font-weight: 800;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.start-sub {
  color: var(--text-2);
  font-size: 1rem;
  line-height: 1.6;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 14px;
  margin: 32px 0;
}
.info-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 14px;
  text-align: center;
}
.info-icon { font-size: 1.8rem; margin-bottom: 8px; }
.info-label { font-size: 0.78rem; color: var(--text-2); margin-bottom: 4px; }
.info-value { font-size: 1rem; font-weight: 700; color: var(--accent-2); }

.dimensions-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 28px;
}
.dim-title {
  font-size: 0.85rem;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 14px;
}
.dim-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 0.9rem;
}
.dim-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  border-radius: 50%;
  font-weight: 800; font-size: 0.85rem;
  flex-shrink: 0;
}
.dim-badge.ei { background: rgba(124,111,255,.25); color: #a78bfa; }
.dim-badge.sn { background: rgba(34,197,94,.2);   color: #4ade80; }
.dim-badge.tf { background: rgba(245,158,11,.2);  color: #fbbf24; }
.dim-badge.jp { background: rgba(239,68,68,.2);   color: #f87171; }
.dim-desc { color: var(--text-2); }

/* ── Buttons ── */
.btn-start {
  display: block;
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 28px var(--accent-glow); }
.btn-start:active { transform: translateY(0); }

/* ── Quiz screen ── */
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.quiz-counter {
  font-size: 0.85rem;
  color: var(--text-2);
  font-weight: 600;
}
.quiz-dim-tag {
  font-size: 0.75rem;
  padding: 3px 10px;
  border-radius: 999px;
  font-weight: 700;
  letter-spacing: .06em;
}
.tag-ei { background: rgba(124,111,255,.2); color: #a78bfa; }
.tag-sn { background: rgba(34,197,94,.15);  color: #4ade80; }
.tag-tf { background: rgba(245,158,11,.15); color: #fbbf24; }
.tag-jp { background: rgba(239,68,68,.15);  color: #f87171; }

/* ── Progress bar ── */
.progress-wrap {
  background: rgba(255,255,255,0.08);
  border-radius: 999px;
  height: 6px;
  margin-bottom: 28px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  transition: width .4s ease;
}

/* ── Question card ── */
.question-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.scenario-label {
  font-size: 0.75rem;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 14px;
}
.scenario-text {
  font-size: 1.05rem;
  line-height: 1.75;
  color: var(--text-1);
}

/* ── Options ── */
.options-wrap {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.option-btn {
  height: auto;
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  text-align: left;
  color: var(--text-1);
  font-size: 0.95rem;
  line-height: 1.6;
  cursor: pointer;
  transition: border-color .15s, background .15s, transform .1s;
  position: relative;
  overflow: hidden;
}
.option-btn::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: transparent;
  transition: background .15s;
}
.option-btn:hover {
  border-color: var(--accent);
  background: rgba(124,111,255,.1);
  transform: translateX(4px);
}
.option-btn:hover::before { background: var(--accent); }
.option-btn:active { transform: translateX(2px); }

.option-letter {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  font-weight: 800; font-size: 0.8rem;
  margin-right: 12px;
  flex-shrink: 0;
  vertical-align: middle;
}
.option-btn.selected {
  border-color: var(--accent);
  background: rgba(124,111,255,.18);
  pointer-events: none;
}
.option-btn.selected::before { background: var(--accent); }
.option-btn.dimmed {
  opacity: .45;
  pointer-events: none;
}

/* ── Result screen ── */
.result-header {
  text-align: center;
  padding: 40px 0 28px;
}
.result-emoji {
  font-size: 4.5rem;
  margin-bottom: 12px;
  animation: float 3s ease-in-out infinite;
}
.mbti-type {
  font-size: clamp(2.8rem, 8vw, 4rem);
  font-weight: 900;
  letter-spacing: .12em;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.mbti-name {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 6px;
}
.mbti-tagline {
  font-size: 0.9rem;
  color: var(--text-2);
  line-height: 1.5;
  max-width: 480px;
  margin: 0 auto 8px;
}

/* ── Dimension score bars ── */
.scores-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 20px;
}
.scores-title {
  font-size: 0.78rem;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 18px;
}
.score-row {
  margin-bottom: 16px;
}
.score-row:last-child { margin-bottom: 0; }
.score-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 0.85rem;
}
.score-left  { font-weight: 700; }
.score-right { font-weight: 700; color: var(--text-2); }
.score-left.active  { color: var(--accent-2); }
.score-right.active { color: var(--accent-2); }
.score-track {
  height: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
  position: relative;
}
.score-fill {
  height: 100%;
  border-radius: 999px;
  transition: width .8s ease;
}
.fill-ei { background: linear-gradient(90deg,#7c6fff,#a78bfa); }
.fill-sn { background: linear-gradient(90deg,#22c55e,#4ade80); }
.fill-tf { background: linear-gradient(90deg,#f59e0b,#fbbf24); }
.fill-jp { background: linear-gradient(90deg,#ef4444,#f87171); }
.score-pct {
  font-size: 0.75rem;
  color: var(--text-3);
  margin-top: 4px;
}

/* ── Type description card ── */
.desc-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 20px;
}
.desc-section-title {
  font-size: 0.78rem;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 14px;
}
.trait-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.trait-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 0.88rem;
  color: var(--text-2);
  line-height: 1.4;
}
.trait-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.dot-green  { background: var(--green); }
.dot-accent { background: var(--accent-2); }

/* ── Retry button ── */
.btn-retry {
  display: block;
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 20px var(--accent-glow);
  margin-bottom: 12px;
}
.btn-retry:hover { transform: translateY(-2px); box-shadow: 0 6px 28px var(--accent-glow); }

.btn-share {
  display: block;
  width: 100%;
  padding: 13px;
  background: transparent;
  color: var(--accent-2);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
}
.btn-share:hover { background: rgba(124,111,255,.1); }

/* ── Transition animation ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn .35s ease forwards; }

/* ── Responsive ── */
@media (max-width: 480px) {
  .trait-grid { grid-template-columns: 1fr; }
  .question-card { padding: 20px 16px; }
  .option-btn    { padding: 15px 16px; }
}
</style>
</head>
<body>
<div class="particles"></div>

<div id="app">

  <!-- ════ START SCREEN ════ -->
  <section id="screen-start" class="screen active">
    <div class="start-header">
      <div class="start-logo">🧠</div>
      <h1 class="start-title">MBTI 人格測驗</h1>
      <p class="start-sub">透過 20 道真實情境題，探索你的四個人格維度傾向<br>揭開你獨特的 MBTI 性格類型</p>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="info-icon">❓</div>
        <div class="info-label">題目數量</div>
        <div class="info-value">20 題</div>
      </div>
      <div class="info-card">
        <div class="info-icon">🎯</div>
        <div class="info-label">每維度</div>
        <div class="info-value">5 題</div>
      </div>
      <div class="info-card">
        <div class="info-icon">🔀</div>
        <div class="info-label">題目模式</div>
        <div class="info-value">隨機抽題</div>
      </div>
      <div class="info-card">
        <div class="info-icon">⏱️</div>

        <div class="info-value">約 5 分鐘</div>

    </div>

    <div class="dimensions-card">
      <div class="dim-title">四大人格維度</div>
      <div class="dim-row">
        <span class="dim-badge ei">E/I</span>
        <span class="dim-desc"><strong>外向 vs 內向</strong> — 你如何補充能量？</span>

      </div>

    <button class="btn-start" onclick="startQuiz()">開始測驗 →</button>
  </section>

  <!-- ════ QUIZ SCREEN ════ -->
  <section id="screen-quiz" class="screen">
    <div class="quiz-header">
      <span class="quiz-counter" id="quiz-counter">第 1 題 / 共 20 題</span>
      <span class="quiz-dim-tag" id="quiz-dim-tag">E/I</span>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>

        <span id="opt-b-text"></span>

  <!-- ════ RESULT SCREEN ════ -->
  <section id="screen-result" class="screen">

      <div class="mbti-tagline" id="result-tagline"></div>

    <div class="scores-card">

      <div class="score-row">

          <span class="score-left"  id="lbl-e">外向 E</span>

      <div class="score-row">

          <span class="score-left"  id="lbl-s">感覺 S</span>

          <div class="score-fill fill-jp" id="fill-jp" style="width:50%"></div>

    <button class="btn-retry" onclick="startQuiz()">🔄 重新測驗</button>
    <button class="btn-share" onclick="shareResult()">📤 分享結果</button>
  </section>

<script>
// ═══════════════════════════════════════════════════════
//  QUESTION BANK  (10 questions per dimension, pick 5)
//  dimension: 'EI' | 'SN' | 'TF' | 'JP'
//  options[0] → first letter of dimension  (E / S / T / J)
//  options[1] → second letter of dimension (I / N / F / P)
// ═══════════════════════════════════════════════════════
const QUESTIONS = {
  EI: [
    {
      scenario: "週末終於沒有行程，你最理想的放鬆方式是什麼？",
      options: [
        "找幾個朋友出去吃飯、唱歌，熱鬧一整天才算充電完畢。",
        "一個人待在家裡看書、追劇或做喜歡的事，靜靜恢復精力。"
      ]
    },
    {
      scenario: "你被指派主持一場公司年會，你的第一反應是？",
      options: [
        "感到興奮，這是展現自己、與大家互動的好機會！",
        "有點緊張，雖然會盡力，但更希望能在幕後協助。"
      ]
    },
    {
      scenario: "在一個你不太認識人的派對上，你通常會怎麼做？",
      options: [
        "主動找人搭話，很快就能融入氣氛，認識新朋友很有趣。",
        "找個安靜的角落，等熟人來找你，或者和一兩個人深聊。"
      ]
    },
    {

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
let questions   = [];   // shuffled question list for this session
let current     = 0;    // current question index
let scores      = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickN(arr, n) {
  return shuffle(arr).slice(0, n);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════════════
//  START QUIZ
// ═══════════════════════════════════════════════════════
function startQuiz() {
  // Reset scores
  scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
  current = 0;

  // Pick 5 questions per dimension and tag them
  const pool = [];
  const dims = [
    { key: 'EI', letters: ['E','I'], tag: 'E/I', tagClass: 'tag-ei' },
    { key: 'SN', letters: ['S','N'], tag: 'S/N', tagClass: 'tag-sn' },
    { key: 'TF', letters: ['T','F'], tag: 'T/F', tagClass: 'tag-tf' },
    { key: 'JP', letters: ['J','P'], tag: 'J/P', tagClass: 'tag-jp' }
  ];
  dims.forEach(d => {
    pickN(QUESTIONS[d.key], 5).forEach(q => {
      pool.push({ ...q, dim: d });
    });
  });

  // Shuffle the combined list
  questions = shuffle(pool);

  showScreen('screen-quiz');
  renderQuestion();
}

// ═══════════════════════════════════════════════════════
//  RENDER QUESTION
// ═══════════════════════════════════════════════════════
function renderQuestion() {
  const q = questions[current];

  // Header
  document.getElementById('quiz-counter').textContent = `第 ${current + 1} 題 / 共 20 題`;
  const tagEl = document.getElementById('quiz-dim-tag');
  tagEl.textContent  = q.dim.tag;
  tagEl.className    = `quiz-dim-tag ${q.dim.tagClass}`;

  // Progress
  document.getElementById('progress-bar').style.width = `${(current / 20) * 100}%`;

  // Question card animation
  const card = document.getElementById('question-card');
  card.classList.remove('fade-in');
  void card.offsetWidth; // reflow
  card.classList.add('fade-in');

  // Text
  document.getElementById('scenario-text').textContent = q.scenario;
  document.getElementById('opt-a-text').textContent    = q.options[0];
  document.getElementById('opt-b-text').textContent    = q.options[1];

  // Reset buttons
  const btnA = document.getElementById('opt-a');
  const btnB = document.getElementById('opt-b');
  btnA.className = 'option-btn';
  btnB.className = 'option-btn';
}

// ═══════════════════════════════════════════════════════
//  SELECT OPTION
// ═══════════════════════════════════════════════════════
function selectOption(idx) {
  const q = questions[current];
  const chosen  = q.dim.letters[idx];
  scores[chosen]++;

  // Visual feedback
  const btnA = document.getElementById('opt-a');
  const btnB = document.getElementById('opt-b');
  if (idx === 0) { btnA.classList.add('selected'); btnB.classList.add('dimmed'); }
  else           { btnB.classList.add('selected'); btnA.classList.add('dimmed'); }

  // Advance after brief delay
  setTimeout(() => {
    current++;
    if (current >= 20) showResult();
    else               renderQuestion();
  }, 320);
}

// ═══════════════════════════════════════════════════════
//  SHOW RESULT
// ═══════════════════════════════════════════════════════
function showResult() {
  const type = (scores.E >= scores.I ? 'E' : 'I') +
               (scores.S >= scores.N ? 'S' : 'N') +
               (scores.T >= scores.F ? 'T' : 'F') +
               (scores.J >= scores.P ? 'J' : 'P');

  const info = MBTI_TYPES[type];

  document.getElementById('result-type').textContent    = type;
  document.getElementById('result-name').textContent    = info.name;
  document.getElementById('result-emoji').textContent   = info.emoji;
  document.getElementById('result-tagline').textContent = info.tagline;

  // Score bars  (percentage = first letter's score out of 5)
  function setBar(fillId, pctId, lblFirst, lblSecond, scoreFirst, scoreSecond, fillClass) {
    const total = scoreFirst + scoreSecond;
    const pct   = total > 0 ? Math.round((scoreFirst / total) * 100) : 50;
    document.getElementById(fillId).style.width = pct + '%';
    document.getElementById(pctId).textContent  =
      `${lblFirst} ${scoreFirst} 分 vs ${lblSecond} ${scoreSecond} 分`;

    // Highlight winning letter
    const firstLabel  = document.getElementById(`lbl-${lblFirst.toLowerCase()}`);
    const secondLabel = document.getElementById(`lbl-${lblSecond.toLowerCase()}`);
    firstLabel.classList.toggle('active',  scoreFirst >= scoreSecond);
    secondLabel.classList.toggle('active', scoreSecond >  scoreFirst);
  }

  setBar('fill-ei', 'pct-ei', 'E', 'I', scores.E, scores.I, 'fill-ei');
  setBar('fill-sn', 'pct-sn', 'S', 'N', scores.S, scores.N, 'fill-sn');
  setBar('fill-tf', 'pct-tf', 'T', 'F', scores.T, scores.F, 'fill-tf');
  setBar('fill-jp', 'pct-jp', 'J', 'P', scores.J, scores.P, 'fill-jp');

  // Traits
  const grid = document.getElementById('trait-grid');
  grid.innerHTML = info.traits.map((t, i) => `
    <div class="trait-item">
      <span class="trait-dot ${i % 2 === 0 ? 'dot-green' : 'dot-accent'}"></span>
      <span>${t}</span>
    </div>`).join('');

  showScreen('screen-result');

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.score-fill').forEach(el => {
      const w = el.style.width;
      el.style.width = '0%';
      setTimeout(() => { el.style.width = w; }, 50);
    });
  }, 100);
}

// ═══════════════════════════════════════════════════════
//  SHARE
// ═══════════════════════════════════════════════════════
function shareResult() {
  const type = document.getElementById('result-type').textContent;
  const name = document.getElementById('result-name').textContent;
  const text = `我的 MBTI 類型是 ${type}（${name}）！E:${scores.E} I:${scores.I} | S:${scores.S} N:${scores.N} | T:${scores.T} F:${scores.F} | J:${scores.J} P:${scores.P}\n快來測試你的類型：${location.href}`;

  if (navigator.share) {
    navigator.share({ title: 'MBTI 人格測驗結果', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      alert('結果已複製到剪貼簿！');
    }).catch(() => {
      alert(text);
    });
  }
}
</script>
